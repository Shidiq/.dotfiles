# General Configs
config-version = 2
start-at-login = true
accordion-padding = 300
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
automatically-unhide-macos-hidden-apps = false

[[on-window-detected]]
if.app-name-regex-substring = 'whatsapp'
run = 'layout floating'

[[on-window-detected]]
if.app-name-regex-substring = 'kaset'
run = 'layout floating'

[[on-window-detected]]
if.app-name-regex-substring = 'finder'
run = 'layout floating'

[[on-window-detected]]
if.app-name-regex-substring = 'activity monitor'
run = 'layout floating'

[[on-window-detected]]
if.app-name-regex-substring = 'updatest'
run = 'layout floating'

[key-mapping]
preset = 'qwerty'

[gaps]
inner.vertical = 10
inner.horizontal = 10
outer.left = 10
outer.right = 10
outer.bottom = 10
outer.top = 10

# Modifier utama = Hyper key (CapsLock via Raycast) = cmd+ctrl+alt+shift.
# Karena Hyper sudah mengandung Shift, "Hyper-shift-x" tidak bisa dibedakan
# dari "Hyper-x" -- makanya "move" dipindah ke [mode.move.binding] terpisah,
# bukan ditumpuk sebagai Hyper+Shift seperti skema alt yang lama.

# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
[mode.main.binding]

cmd-h = []  # Disable "hide application"
# TIDAK diubah: menangkap shortcut asli macOS Cmd+Option+H ("Hide Others").
# Aman berdampingan dengan Hyper-h di bawah -- AeroSpace mencocokkan modifier
# secara exact match, terbukti dari file lama Anda yang sudah punya alt-1 dan
# cmd-ctrl-alt-shift-1 aktif bersamaan tanpa saling mengganggu.
cmd-alt-h = []  # Disable "hide others"

cmd-ctrl-alt-shift-f = 'fullscreen'
# alt-ctrl-f (toggle floating) sengaja DIHAPUS: kalau ikut dikonversi ke Hyper,
# dia jadi identik dengan baris fullscreen di atas (sama-sama sudah punya ctrl).
# Toggle floating tetap ada lewat mode.service -> f (Hyper-; lalu f).

cmd-ctrl-alt-shift-left = 'join-with left'
cmd-ctrl-alt-shift-down = 'join-with down'
cmd-ctrl-alt-shift-up = 'join-with up'
cmd-ctrl-alt-shift-right = 'join-with right'

# See: https://nikitabobko.github.io/AeroSpace/commands#layout
cmd-ctrl-alt-shift-slash = 'layout tiles horizontal vertical'
cmd-ctrl-alt-shift-comma = 'layout accordion horizontal vertical'

# See: https://nikitabobko.github.io/AeroSpace/commands#focus
cmd-ctrl-alt-shift-h = 'focus left'
cmd-ctrl-alt-shift-j = 'focus down'
cmd-ctrl-alt-shift-k = 'focus up'
cmd-ctrl-alt-shift-l = 'focus right'

# Masuk ke mode "move" -- di dalamnya h/j/k/l dan angka 1-5 tidak perlu
# modifier sama sekali karena Anda sudah "di dalam" konteks move.
cmd-ctrl-alt-shift-m = 'mode move'

# See: https://nikitabobko.github.io/AeroSpace/commands#resize
cmd-ctrl-alt-shift-minus = 'resize smart -50'
cmd-ctrl-alt-shift-equal = 'resize smart +50'

# See: https://nikitabobko.github.io/AeroSpace/commands#workspace
cmd-ctrl-alt-shift-1 = 'workspace 1'
cmd-ctrl-alt-shift-2 = 'workspace 2'
cmd-ctrl-alt-shift-3 = 'workspace 3'
cmd-ctrl-alt-shift-4 = 'workspace 4'
cmd-ctrl-alt-shift-5 = 'workspace 5'
# Backup lama "cmd-ctrl-alt-shift-1..5" dihapus -- sekarang persis sama dengan
# baris di atas, jadi cuma bikin duplicate key di TOML.

cmd-ctrl-alt-shift-tab = 'workspace-back-and-forth'

# See: https://nikitabobko.github.io/AeroSpace/commands#mode
cmd-ctrl-alt-shift-semicolon = 'mode service'
cmd-ctrl-alt-shift-enter = 'mode apps'

[mode.move.binding]
esc = ['mode main']
# h/j/k/l TIDAK auto-exit, biar bisa nge-nudge window berkali-kali tanpa
# masuk mode ulang tiap kali. Tekan esc kalau sudah selesai.
h = 'move left'
j = 'move down'
k = 'move up'
l = 'move right'
# Angka langsung exit setelah pindah workspace -- biasanya itu tindakan sekali jalan.
1 = ['move-node-to-workspace 1 --focus-follows-window', 'mode main']
2 = ['move-node-to-workspace 2 --focus-follows-window', 'mode main']
3 = ['move-node-to-workspace 3 --focus-follows-window', 'mode main']
4 = ['move-node-to-workspace 4 --focus-follows-window', 'mode main']
5 = ['move-node-to-workspace 5 --focus-follows-window', 'mode main']

[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main'] # reset layout
f = ['layout floating tiling', 'mode main'] # Toggle between floating and tiling layout
backspace = ['close-all-windows-but-current', 'mode main']

[mode.apps.binding]
g = ['exec-and-forget open -a /Applications/Ghostty.app', 'mode main']

