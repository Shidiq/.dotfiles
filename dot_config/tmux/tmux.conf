# Prefix key
unbind C-b
set -g prefix `
bind ` send-prefix

# Options
set -sg terminal-overrides ",*:RGB"  # true color support
set -g default-terminal "screen-256color"
set -g escape-time 0  # disable delays on escape sequences
set -g renumber-windows on  # keep numbering sequential
set -g repeat-time 1000  # increase "prefix-free" window

# Mulai index dari 1 (lebih intuitif di keyboard)
set -g base-index 1
setw -g pane-base-index 1

# Increase scrollback buffer
set -g history-limit 10000

# Keybindings: split
bind \\ split-window -h
bind - split-window -v

# navigasi pane vim-style
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Keybindings: disable repeat for arrows
bind Up select-pane -U
bind Left select-pane -L
bind Down select-pane -D
bind Right select-pane -R

# Keybindings: wasd
bind w select-pane -U
bind a select-pane -L
bind s select-pane -D
bind d select-pane -R

# resize pane
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# status bar minimal
set -g status-position bottom
# set -g status-bg "#282C34"
set -g status-bg default
set -g status-style bg=default
set -g status-fg "#ABB2BF"
set -g status-left ""
set -g status-right "#[fg=#61AFEF]%H:%M #[fg=#ABB2BF]%d-%m-%Y"

# Theme: borders
set -g pane-border-lines simple
set -g pane-border-style fg=black,bright
set -g pane-active-border-style fg=magenta

# Theme: status (windows)
set -g window-status-format "●"
set -g window-status-current-format "●"

set -g window-status-current-style "#{?window_zoomed_flag,fg=yellow,fg=magenta\#,nobold}"
set -g window-status-bell-style "fg=red,nobold"

# Keybindings: windows
bind -n C-Tab next-window
bind -n C-S-Tab previous-window

bind -n M-1 select-window -t :1
bind -n M-2 select-window -t :2
bind -n M-3 select-window -t :3
bind -n M-4 select-window -t :4
bind -n M-5 select-window -t :5
bind -n M-6 select-window -t :6
bind -n M-7 select-window -t :7
bind -n M-8 select-window -t :8
bind -n M-9 select-window -t :9

# Keybindings: other
bind f resize-pane -Z
bind q detach-client
bind e choose-window -Z

bind -n M-w select-pane -U
bind -n M-a select-pane -L
bind -n M-s select-pane -D
bind -n M-d select-pane -R
bind -n M-f resize-pane -Z

set -g mouse on

# Plugin list
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'azorng/tmux-smooth-scroll'

# Smooth scroll config
set -g @smooth-scroll-speed "100"       # 0-1000, lower = faster
set -g @smooth-scroll-easing "sine"     # linear | sine | quad
set -g @smooth-scroll-normal "3"        # lines per scroll
set -g @smooth-scroll-mouse "true"

# HARUS di baris paling bawah
run '~/.tmux/plugins/tpm/tpm'
