# Prefix key: Ctrl+a (lebih ergonomis dari default Ctrl+b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Mouse support
set -g mouse on

# Mulai index dari 1 (lebih intuitif di keyboard)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows otomatis saat ada yang ditutup
set -g renumber-windows on

# Increase scrollback buffer
set -g history-limit 10000

# split panes
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# navigasi pane vim-style
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# resize pane
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# warna
set -g default-terminal "screen-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# status bar minimal
set -g status-position bottom
set -g status-bg "#282C34"
set -g status-fg "#ABB2BF"
set -g status-left ""
set -g status-right "#[fg=#61AFEF]%H:%M #[fg=#ABB2BF]%d-%m-%Y"
